services:
  postgres:
    image: postgres:16-alpine
    container_name: collabai-postgres
    environment:
      POSTGRES_DB: collabai
      POSTGRES_USER: collabai
      POSTGRES_PASSWORD: collabai
    ports:
      - "5434:5432"
    volumes:
      - collabai_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabai -d collabai"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: collabai-redis
    ports:
      - "6381:6379"
    volumes:
      - collabai_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: collabai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: collabai
      MINIO_ROOT_PASSWORD: collabai-dev-password
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - collabai_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  # MinIO bootstrap: create the attachments bucket once the server is healthy.
  minio-init:
    image: minio/mc:latest
    container_name: collabai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 collabai collabai-dev-password &&
        mc mb -p local/collabai-attachments || true &&
        mc version enable local/collabai-attachments || true &&
        cat > /tmp/cors.json <<'JSON'
        {
          "CORSRules": [
            {
              "AllowedOrigins": [
                "http://localhost:3000",
                "http://localhost:5173",
                "http://localhost:5174",
                "http://localhost:5175",
                "http://localhost:8010"
              ],
              "AllowedMethods": ["PUT", "GET", "HEAD", "POST"],
              "AllowedHeaders": ["*"],
              "ExposeHeaders": ["ETag", "x-amz-request-id", "x-amz-version-id"],
              "MaxAgeSeconds": 3600
            }
          ]
        }
        JSON
        mc cors set local/collabai-attachments /tmp/cors.json || true

  mailhog:
    image: mailhog/mailhog:latest
    container_name: collabai-mailhog
    ports:
      - "1026:1025"
      - "8026:8025"

  # LiveKit SFU for the in-channel huddle feature. The dev key/secret pair
  # below is hard-coded so the backend can mint AccessTokens without any
  # extra config; do NOT reuse for production. See README "Huddles" for
  # how to swap in a real LiveKit Cloud project.
  livekit:
    image: livekit/livekit-server:latest
    container_name: collabai-livekit
    command:
      - --dev
      - --bind
      - 0.0.0.0
    environment:
      LIVEKIT_KEYS: "devkey: dev-secret-please-change-me-32chars-min"
    ports:
      - "7880:7880" # signaling (WebSocket)
      - "7881:7881" # TURN/UDP
      - "7882:7882/udp"

volumes:
  collabai_postgres:
  collabai_redis:
  collabai_minio:
