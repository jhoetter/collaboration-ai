name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without leading v)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build-app-image:
    name: Build collabai-app Docker image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_ref: ${{ steps.tags.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        name: Resolve version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - id: tags
        run: |
          v="${{ steps.version.outputs.version }}"
          echo "image_ref=ghcr.io/${{ github.repository_owner }}/collaboration-ai:${v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.image_ref }}
          outputs: type=docker,dest=/tmp/collabai-app-${{ steps.version.outputs.version }}.tar
      - uses: actions/upload-artifact@v4
        with:
          name: app-image
          path: /tmp/collabai-app-${{ steps.version.outputs.version }}.tar

  build-agent-tarball:
    name: Build @collabai/agent-cli tarball
    runs-on: ubuntu-latest
    needs: build-app-image
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @collabai/agent-cli build
      - name: Pack
        working-directory: packages/agent-cli
        run: |
          npm version --no-git-tag-version "${{ needs.build-app-image.outputs.version }}"
          npm pack
          mv collabai-agent-cli-*.tgz "/tmp/collabai-agent-${{ needs.build-app-image.outputs.version }}.tgz"
      - uses: actions/upload-artifact@v4
        with:
          name: agent-cli
          path: /tmp/collabai-agent-${{ needs.build-app-image.outputs.version }}.tgz

  build-react-embeds-tarball:
    name: Build @collabai/react-embeds tarball
    runs-on: ubuntu-latest
    needs: build-app-image
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @collabai/react-embeds build
      - name: Pack
        working-directory: packages/react-embeds
        run: |
          npm version --no-git-tag-version "${{ needs.build-app-image.outputs.version }}"
          npm pack
          mv collabai-react-embeds-*.tgz "/tmp/collabai-react-embeds-${{ needs.build-app-image.outputs.version }}.tgz"
      - uses: actions/upload-artifact@v4
        with:
          name: react-embeds
          path: /tmp/collabai-react-embeds-${{ needs.build-app-image.outputs.version }}.tgz

  publish-release:
    name: Publish GitHub release + open hof-os bump PR
    runs-on: ubuntu-latest
    needs: [build-app-image, build-agent-tarball, build-react-embeds-tarball]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/release
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-app-image.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            "/tmp/release/app-image/collabai-app-${VERSION}.tar" \
            "/tmp/release/agent-cli/collabai-agent-${VERSION}.tgz" \
            "/tmp/release/react-embeds/collabai-react-embeds-${VERSION}.tgz" \
            --title "v${VERSION}" \
            --notes "Auto-generated release. See CHANGELOG."
      - name: Open hof-os bump PR
        if: ${{ secrets.HOFOS_BUMP_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.HOFOS_BUMP_TOKEN }}
          VERSION: ${{ needs.build-app-image.outputs.version }}
          IMAGE_REF: ${{ needs.build-app-image.outputs.image_ref }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          ./infra/release/open-hofos-pr.sh
