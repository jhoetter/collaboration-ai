name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without leading v)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build-app-image:
    name: Build collabai-app Docker image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_ref: ${{ steps.tags.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        name: Resolve version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - id: tags
        run: |
          v="${{ steps.version.outputs.version }}"
          echo "image_ref=ghcr.io/${{ github.repository_owner }}/collaboration-ai:${v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.image_ref }}
          outputs: type=docker,dest=/tmp/collabai-app-${{ steps.version.outputs.version }}.tar
      - uses: actions/upload-artifact@v4
        with:
          name: app-image
          path: /tmp/collabai-app-${{ steps.version.outputs.version }}.tar

  build-agent-tarball:
    name: Build @collabai/agent-cli tarball
    runs-on: ubuntu-latest
    needs: build-app-image
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @collabai/agent-cli build
      - name: Pack
        working-directory: packages/agent-cli
        run: |
          npm version --no-git-tag-version --allow-same-version "${{ needs.build-app-image.outputs.version }}"
          npm pack
          mv collabai-agent-cli-*.tgz "/tmp/collabai-agent-${{ needs.build-app-image.outputs.version }}.tgz"
      - uses: actions/upload-artifact@v4
        with:
          name: agent-cli
          path: /tmp/collabai-agent-${{ needs.build-app-image.outputs.version }}.tgz

  build-hofos-ui-tarball:
    name: Build @collabai/hofos-ui tarball
    runs-on: ubuntu-latest
    needs: build-app-image
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build release bundle (collabai-ui)
        run: |
          set -euo pipefail
          VERSION="${{ needs.build-app-image.outputs.version }}"
          pnpm run build:dist
          test -f "packages/hofos-ui/dist/index.js" || (echo "missing packages/hofos-ui/dist/index.js" && exit 1)
          npm --prefix packages/hofos-ui version --no-git-tag-version --allow-same-version "${VERSION}"
          pnpm --dir packages/hofos-ui pack --pack-destination .
          mv packages/hofos-ui/collabai-hofos-ui-*.tgz "/tmp/collabai-ui-${VERSION}.tgz"
          ls -lh "/tmp/collabai-ui-${VERSION}.tgz"
      - uses: actions/upload-artifact@v4
        with:
          name: hofos-ui
          path: /tmp/collabai-ui-${{ needs.build-app-image.outputs.version }}.tgz

  publish-release:
    name: Publish GitHub release + open hof-os bump PR
    runs-on: ubuntu-latest
    needs: [build-app-image, build-agent-tarball, build-hofos-ui-tarball]
    steps:
      - uses: actions/checkout@v4
      # Pull each named artifact separately. Skipping the unnamed
      # download lets us avoid docker/build-push-action@v6's auto-
      # uploaded `*.dockerbuild` summary artifact (which sometimes
      # 5xx's during download) and gives clearer per-artifact errors.
      - uses: actions/download-artifact@v4
        with:
          name: app-image
          path: /tmp/release/app-image
      - uses: actions/download-artifact@v4
        with:
          name: agent-cli
          path: /tmp/release/agent-cli
      - uses: actions/download-artifact@v4
        with:
          name: hofos-ui
          path: /tmp/release/hofos-ui
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-app-image.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            "/tmp/release/app-image/collabai-app-${VERSION}.tar" \
            "/tmp/release/agent-cli/collabai-agent-${VERSION}.tgz" \
            "/tmp/release/hofos-ui/collabai-ui-${VERSION}.tgz" \
            --title "v${VERSION}" \
            --notes "Auto-generated release. See CHANGELOG."
  notify-hof-os:
    name: Notify hof-os of new release
    needs: [build-app-image, build-agent-tarball, build-hofos-ui-tarball, publish-release]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Triggers on every successful release. This fires a single
    # repository_dispatch event and lets hof-os' own
    # sister-product-lock workflow open a PR.
    if: needs.build-app-image.outputs.version != ''
    steps:
      - name: Dispatch lockfile bump to hof-os
        env:
          GH_TOKEN: ${{ secrets.HOFOS_DISPATCH_TOKEN }}
          NEW_VERSION: ${{ needs.build-app-image.outputs.version }}
          IMAGE_REF: ${{ needs.build-app-image.outputs.image_ref }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "HOFOS_DISPATCH_TOKEN is not set; skipping hof-os dispatch."
            exit 0
          fi
          payload="$(jq -nc \
            --arg version "${NEW_VERSION}" \
            --arg tag "v${NEW_VERSION}" \
            --arg source_sha "${GIT_SHA}" \
            --arg image_ref "${IMAGE_REF}" \
            '{version: $version, tag: $tag, source_sha: $source_sha, image_ref: $image_ref}')"
          request="$(jq -nc \
            --arg event_type collabai-released \
            --argjson client_payload "${payload}" \
            '{event_type: $event_type, client_payload: $client_payload}')"
          # Three attempts with exponential backoff (3s, 9s, 27s).
          # GitHub's dispatch API is normally instant but flaky bursts
          # do happen during outages, and an unfired dispatch silently
          # leaves hof-os pinned to the previous version.
          for attempt in 1 2 3; do
            if gh api repos/jhoetter/hof-os/dispatches \
              --method POST \
              --input - <<< "${request}"; then
              echo "Dispatched collabai-released v${NEW_VERSION} (attempt ${attempt})"
              exit 0
            fi
            sleep $((3 ** attempt))
          done
          echo "Failed to dispatch after 3 attempts" >&2
          exit 1
