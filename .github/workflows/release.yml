name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without leading v)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build-app-image:
    name: Build collabai-app Docker image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_ref: ${{ steps.tags.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        name: Resolve version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - id: tags
        run: |
          v="${{ steps.version.outputs.version }}"
          echo "image_ref=ghcr.io/${{ github.repository_owner }}/collaboration-ai:${v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.image_ref }}
          outputs: type=docker,dest=/tmp/collabai-app-${{ steps.version.outputs.version }}.tar
      - uses: actions/upload-artifact@v4
        with:
          name: app-image
          path: /tmp/collabai-app-${{ steps.version.outputs.version }}.tar

  build-agent-tarball:
    name: Build @collabai/agent-cli tarball
    runs-on: ubuntu-latest
    needs: build-app-image
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @collabai/agent-cli build
      - name: Pack
        working-directory: packages/agent-cli
        run: |
          npm version --no-git-tag-version "${{ needs.build-app-image.outputs.version }}"
          npm pack
          mv collabai-agent-cli-*.tgz "/tmp/collabai-agent-${{ needs.build-app-image.outputs.version }}.tgz"
      - uses: actions/upload-artifact@v4
        with:
          name: agent-cli
          path: /tmp/collabai-agent-${{ needs.build-app-image.outputs.version }}.tgz

  build-react-embeds-tarball:
    name: Build @collabai/react-embeds tarball
    runs-on: ubuntu-latest
    needs: build-app-image
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @collabai/react-embeds build
      - name: Pack
        working-directory: packages/react-embeds
        run: |
          npm version --no-git-tag-version "${{ needs.build-app-image.outputs.version }}"
          npm pack
          mv collabai-react-embeds-*.tgz "/tmp/collabai-react-embeds-${{ needs.build-app-image.outputs.version }}.tgz"
      - uses: actions/upload-artifact@v4
        with:
          name: react-embeds
          path: /tmp/collabai-react-embeds-${{ needs.build-app-image.outputs.version }}.tgz

  publish-release:
    name: Publish GitHub release + open hof-os bump PR
    runs-on: ubuntu-latest
    needs: [build-app-image, build-agent-tarball, build-react-embeds-tarball]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/release
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-app-image.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            "/tmp/release/app-image/collabai-app-${VERSION}.tar" \
            "/tmp/release/agent-cli/collabai-agent-${VERSION}.tgz" \
            "/tmp/release/react-embeds/collabai-react-embeds-${VERSION}.tgz" \
            --title "v${VERSION}" \
            --notes "Auto-generated release. See CHANGELOG."
  notify-hof-os:
    name: Notify hof-os of new release
    needs: [build-app-image, build-agent-tarball, build-react-embeds-tarball, publish-release]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Mirrors office-ai's notify-hof-os gate: runs whenever a new
    # version is cut. The token check happens implicitly when the
    # checkout step runs against jhoetter/hof-os.
    if: needs.build-app-image.outputs.version != ''
    steps:
      - name: Checkout hof-os
        uses: actions/checkout@v4
        with:
          repository: jhoetter/hof-os
          token: ${{ secrets.COLLABAI_SYNC_TOKEN }}
          ref: main

      - name: Update collabai lockfile
        env:
          NEW_VERSION: ${{ needs.build-app-image.outputs.version }}
          IMAGE_REF: ${{ needs.build-app-image.outputs.image_ref }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p infra
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REPO="${{ github.repository }}"
          APP_TARBALL="https://github.com/${REPO}/releases/download/v${NEW_VERSION}/collabai-app-${NEW_VERSION}.tar"
          AGENT_TARBALL="https://github.com/${REPO}/releases/download/v${NEW_VERSION}/collabai-agent-${NEW_VERSION}.tgz"
          EMBEDS_TARBALL="https://github.com/${REPO}/releases/download/v${NEW_VERSION}/collabai-react-embeds-${NEW_VERSION}.tgz"
          cat > infra/collabai.lock.json <<EOF
          {
            "version": "${NEW_VERSION}",
            "app_image": "${IMAGE_REF}",
            "app_image_tarball": "${APP_TARBALL}",
            "agent_version": "${NEW_VERSION}",
            "agent_tarball": "${AGENT_TARBALL}",
            "react_embeds_version": "${NEW_VERSION}",
            "react_embeds_tarball": "${EMBEDS_TARBALL}",
            "published_at": "${PUBLISHED_AT}",
            "source_repo": "${REPO}",
            "source_sha": "${GIT_SHA}"
          }
          EOF
          cat infra/collabai.lock.json

      - name: Commit and push
        env:
          NEW_VERSION: ${{ needs.build-app-image.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/collabai.lock.json
          if git diff --cached --quiet; then
            echo "collabai.lock.json already at ${NEW_VERSION}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(collabai): bump to ${NEW_VERSION}"
          git pull --rebase origin main
          git push origin main
